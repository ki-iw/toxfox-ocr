preprocessing:
  # Downscale images whose pixel count exceeds this, preserving aspect ratio.
  # Keeps EasyOCR memory bounded on machines without much RAM. Set to 0 to disable.
  max_pixels: 3000000
  steps:
    gray:
      enabled: False
    blur:
      enabled: False
    threshold:
      enabled: False

ocr:
  bb_threshold_factor: 0.8

postprocessing:
  FAISSIndexer_model_name: all-MiniLM-L6-v2
  ingredient_threshold: 0.8
  typo_threshold: 0.8
  misspelling_set: ["0il", "oi", "ol", "oill", "oll", "oli"]
  detection_type: both

evaluation:
  method: levenshtein # levenstein or exact
  threshold: 80
